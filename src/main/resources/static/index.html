<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LetsGo Travel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">🌍 LetsGo Travel</a>
    </div>
</nav>

<header class="hero">
    <h1>Explore the World</h1>
    <p>Find your perfect travel package</p>

    <div class="mt-4">
        <input type="text" id="searchInput" class="form-control w-50 mx-auto"
               placeholder="Search by location...">

        <button class="btn btn-light mt-3" onclick="searchPackages()">
            Search
        </button>
    </div>
</header>

<div class="container mt-5">
    <div id="cards" class="row"></div>
</div>

<script src="app.js" defer></script>

</body>
</html>
