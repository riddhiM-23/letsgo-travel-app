<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Package - LetsGo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">🌍 LetsGo Travel</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Book Your Travel Package</h2>

    <div class="card p-4 shadow">

        <input type="text" id="name" class="form-control mb-3" placeholder="Your Name">

        <input type="email" id="email" class="form-control mb-3" placeholder="Email">

        <input type="number" id="persons" class="form-control mb-3" placeholder="Number of Persons">

        <input type="number" id="packageId" class="form-control mb-3" placeholder="Package ID">

        <button class="btn btn-primary w-100" onclick="bookNow()">
            Confirm Booking
        </button>

    </div>

    <div id="msg" class="text-center mt-3"></div>

</div>

<script src="booking.js"></script>

</body>
</html>
